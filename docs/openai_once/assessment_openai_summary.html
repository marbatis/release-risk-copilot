<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Release Risk Copilot - OpenAI One-Time Run</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; margin: 32px; background: #f6f8fb; }
    .card { background: white; border: 1px solid #d0d7de; border-radius: 10px; padding: 20px; max-width: 980px; }
    h1 { margin-top: 0; font-size: 24px; }
    .muted { color: #57606a; }
    pre { background: #0d1117; color: #c9d1d9; padding: 16px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Release Risk Copilot - One-Time Provider Run</h1>
    <p class="muted">Captured: 2026-03-31</p>
    <p class="muted">Requested provider mode: <strong>openai</strong>; runtime fallback may apply if API credentials are invalid.</p>
    <pre id="json"></pre>
  </div>
  <script>
    fetch('assessment_openai_summary.json')
      .then(r => r.json())
      .then(data => { document.getElementById('json').textContent = JSON.stringify(data, null, 2); });
  </script>
</body>
</html>
